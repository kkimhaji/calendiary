spring:
  datasource:
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/calendiary
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

security:
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    expiration: 86400000 # one day
    refresh-token:
      expiration: 604800000 # 7 days